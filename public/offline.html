<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#FFF9F0" />
    <title>轻燃AI离线</title>
    <style>
      :root {
        color-scheme: light;
        background: #fff9f0;
        color: #2a261f;
        font-family: Inter, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }
      body {
        margin: 0;
        min-height: 100dvh;
        display: grid;
        place-items: center;
        padding: 24px;
        background:
          radial-gradient(circle at 20% 20%, rgba(240,181,110,.2), transparent 30%),
          radial-gradient(circle at 80% 75%, rgba(103,181,107,.18), transparent 30%),
          #fff9f0;
      }
      main {
        width: min(100%, 360px);
        border: 1px solid rgba(96,74,48,.08);
        border-radius: 18px;
        padding: 22px;
        background: rgba(255,255,255,.82);
        box-shadow: 0 18px 54px rgba(104,83,55,.12);
        backdrop-filter: blur(18px);
      }
      h1 {
        margin: 0 0 10px;
        font-size: 22px;
      }
      p {
        margin: 0 0 16px;
        color: rgba(42,38,31,.68);
        line-height: 1.7;
        font-size: 14px;
      }
      button {
        width: 100%;
        height: 44px;
        border: 0;
        border-radius: 999px;
        color: #fff;
        font-weight: 700;
        background: linear-gradient(135deg, #75c777, #54a95d);
      }
    </style>
  </head>
  <body>
    <main>
      <h1>当前处于离线状态</h1>
      <p>已保存的本地数据仍会保留。恢复网络后重新打开轻燃AI，AI、云同步和最新页面会继续可用。</p>
      <button onclick="location.reload()">重新连接</button>
    </main>
  </body>
</html>
