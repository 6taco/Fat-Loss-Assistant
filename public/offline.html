<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#0A0A0F" />
    <title>减脂助手离线</title>
    <style>
      :root {
        color-scheme: dark;
        background: #0a0a0f;
        color: #fff;
        font-family: Inter, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }
      body {
        margin: 0;
        min-height: 100dvh;
        display: grid;
        place-items: center;
        padding: 24px;
        background:
          radial-gradient(circle at 20% 20%, rgba(10,132,255,.14), transparent 30%),
          radial-gradient(circle at 80% 75%, rgba(48,209,88,.08), transparent 30%),
          #0a0a0f;
      }
      main {
        width: min(100%, 360px);
        border: 1px solid rgba(255,255,255,.1);
        border-radius: 18px;
        padding: 22px;
        background: rgba(255,255,255,.05);
        box-shadow: 0 18px 54px rgba(0,0,0,.45);
        backdrop-filter: blur(18px);
      }
      h1 {
        margin: 0 0 10px;
        font-size: 22px;
      }
      p {
        margin: 0 0 16px;
        color: rgba(255,255,255,.68);
        line-height: 1.7;
        font-size: 14px;
      }
      button {
        width: 100%;
        height: 44px;
        border: 0;
        border-radius: 999px;
        color: #fff;
        font-weight: 700;
        background: linear-gradient(135deg, #0a84ff, #30d158);
      }
    </style>
  </head>
  <body>
    <main>
      <h1>当前处于离线状态</h1>
      <p>已保存的本地数据仍会保留。恢复网络后重新打开减脂助手，AI、云同步和最新页面会继续可用。</p>
      <button onclick="location.reload()">重新连接</button>
    </main>
  </body>
</html>
